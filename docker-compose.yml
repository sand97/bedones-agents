services:
  postgres:
    image: postgres:12
    ports:
      - '5255:5432'
    environment:
      POSTGRES_USER: bedones
      POSTGRES_PASSWORD: bedones
      POSTGRES_DB: bedones
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

volumes:
  pgdata:
