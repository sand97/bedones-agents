services:
  postgres:
    image: postgres:12
    ports:
      - '5255:5432'
    environment:
      POSTGRES_USER: bedones
      POSTGRES_PASSWORD: bedones
      POSTGRES_DB: bedones
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  image-cropper:
    build:
      context: ./services/image-cropper
      dockerfile: Dockerfile
    ports:
      - '8011:8011'
    environment:
      - HOST=0.0.0.0
      - PORT=8011
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    restart: unless-stopped

volumes:
  pgdata:
  qdrant_data:
