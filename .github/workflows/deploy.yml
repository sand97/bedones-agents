name: Build & Deploy

concurrency:
  group: build-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy.yml"
      - ".dockerignore"
      - "apps/backend/**"
      - "apps/whatsapp-connector/**"
      - "apps/frontend/**"
      - "apps/design/**"
      - "services/image-cropper/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  workflow_dispatch:

jobs:
  # ── Fan-in: detect what changed once, fan-out to every build/deploy job ──
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      connector: ${{ steps.filter.outputs.connector }}
      cropper: ${{ steps.filter.outputs.cropper }}
      frontend: ${{ steps.filter.outputs.frontend }}
      design: ${{ steps.filter.outputs.design }}
      shared: ${{ steps.filter.outputs.shared }}
      dockerignore: ${{ steps.filter.outputs.dockerignore }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            shared:
              - '.github/workflows/deploy.yml'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
            dockerignore:
              - '.dockerignore'
            backend:
              - 'apps/backend/**'
            connector:
              - 'apps/whatsapp-connector/**'
            cropper:
              - 'services/image-cropper/**'
            frontend:
              - 'apps/frontend/**'
            design:
              - 'apps/design/**'

  # ── Container images (GHCR): backend, connector, cropper — built in parallel ──
  build-images:
    needs: changes
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: backend
            context: .
            dockerfile: apps/backend/Dockerfile
            image: bedones-moderator-backend
          - id: connector
            context: .
            dockerfile: apps/whatsapp-connector/Dockerfile
            image: bedones-moderator-connector
          - id: cropper
            context: services/image-cropper
            dockerfile: services/image-cropper/Dockerfile
            image: bedones-moderator-cropper

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute registry namespace
        id: vars
        shell: bash
        run: |
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "${GITHUB_OUTPUT}"
          echo "push=$([[ '${{ github.event_name }}' == 'push' && '${{ github.ref }}' == 'refs/heads/main' ]] && echo true || echo false)" >> "${GITHUB_OUTPUT}"

      - name: Decide whether to build image
        id: plan
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          MATRIX_ID: ${{ matrix.id }}
          SHARED_CHANGED: ${{ needs.changes.outputs.shared }}
          DOCKERIGNORE_CHANGED: ${{ needs.changes.outputs.dockerignore }}
          BACKEND_CHANGED: ${{ needs.changes.outputs.backend }}
          CONNECTOR_CHANGED: ${{ needs.changes.outputs.connector }}
          CROPPER_CHANGED: ${{ needs.changes.outputs.cropper }}
        run: |
          should_build=false

          if [[ "${EVENT_NAME}" == "workflow_dispatch" || "${SHARED_CHANGED}" == "true" || "${DOCKERIGNORE_CHANGED}" == "true" ]]; then
            should_build=true
          else
            case "${MATRIX_ID}" in
              backend)
                [[ "${BACKEND_CHANGED}" == "true" ]] && should_build=true
                ;;
              connector)
                [[ "${CONNECTOR_CHANGED}" == "true" ]] && should_build=true
                ;;
              cropper)
                [[ "${CROPPER_CHANGED}" == "true" ]] && should_build=true
                ;;
            esac
          fi

          echo "build=${should_build}" >> "${GITHUB_OUTPUT}"

      - name: Skip unchanged image
        if: steps.plan.outputs.build != 'true'
        run: echo "Skipping ${{ matrix.id }} because no relevant files changed."

      - name: Set up Docker Buildx
        if: steps.plan.outputs.build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: steps.plan.outputs.build == 'true' && steps.vars.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        if: steps.plan.outputs.build == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.vars.outputs.owner }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=git-${{ github.sha }},enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=raw,value=main,enable={{is_default_branch}}

      - name: Build and optionally push image
        if: steps.plan.outputs.build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ steps.vars.outputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.id }}
          cache-to: type=gha,mode=max,scope=${{ matrix.id }}
          platforms: linux/amd64

  # ── Swarm deploys: depend on the images above ──
  deploy-backend:
    needs:
      - changes
      - build-images
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && (needs.changes.outputs.shared == 'true' || needs.changes.outputs.dockerignore == 'true' || needs.changes.outputs.backend == 'true')

    steps:
      - name: Compute backend deploy variables
        id: vars
        shell: bash
        run: |
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "${GITHUB_OUTPUT}"
          echo "image=bedones-moderator-backend" >> "${GITHUB_OUTPUT}"
          echo "tag=main" >> "${GITHUB_OUTPUT}"
          echo "stack=bedones-moderator-stack" >> "${GITHUB_OUTPUT}"
          echo "service=backend" >> "${GITHUB_OUTPUT}"

      - name: Deploy backend to Docker Swarm
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker pull ghcr.io/sand97/bedones-moderator-cropper:main
            docker pull ghcr.io/sand97/bedones-moderator-backend:main

            docker service update \
              --force \
              --image ghcr.io/${{ steps.vars.outputs.owner }}/${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }} \
              --with-registry-auth \
              ${{ steps.vars.outputs.stack }}_${{ steps.vars.outputs.service }}

            echo "Waiting for service update..."
            sleep 5
            docker service ps ${{ steps.vars.outputs.stack }}_${{ steps.vars.outputs.service }} --filter "desired-state=running" --format "{{.Name}} {{.Image}} {{.CurrentState}}"

  deploy-connector:
    needs:
      - changes
      - build-images
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && (needs.changes.outputs.shared == 'true' || needs.changes.outputs.dockerignore == 'true' || needs.changes.outputs.connector == 'true')

    steps:
      - name: Compute connector deploy variables
        id: vars
        shell: bash
        run: |
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "${GITHUB_OUTPUT}"
          echo "image=bedones-moderator-connector" >> "${GITHUB_OUTPUT}"
          echo "tag=main" >> "${GITHUB_OUTPUT}"
          echo "stack=bedones-moderator-stack" >> "${GITHUB_OUTPUT}"
          echo "service=connector" >> "${GITHUB_OUTPUT}"

      - name: Deploy connector to Docker Swarm
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker pull ghcr.io/sand97/bedones-moderator-connector:main

            docker service update \
              --force \
              --image ghcr.io/${{ steps.vars.outputs.owner }}/${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }} \
              --with-registry-auth \
              ${{ steps.vars.outputs.stack }}_${{ steps.vars.outputs.service }}

            echo "Waiting for service update..."
            sleep 5
            docker service ps ${{ steps.vars.outputs.stack }}_${{ steps.vars.outputs.service }} --filter "desired-state=running" --format "{{.Name}} {{.Image}} {{.CurrentState}}"

  # ── Cloudflare deploys: independent of the image builds, run in parallel ──
  deploy-frontend:
    needs: changes
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && (needs.changes.outputs.shared == 'true' || needs.changes.outputs.frontend == 'true')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          HUSKY: 0

      - name: Export VITE variables
        env:
          VARS_JSON: ${{ toJSON(vars) }}
        run: |
          echo "${VARS_JSON}" | jq -r '
            to_entries
            | sort_by(.key)
            | .[]
            | select(.key | startswith("VITE_"))
            | select(.value != null)
            | select((.value | tostring | contains("\n")) | not)
            | "\(.key)=\(.value|tostring)"
          ' >> "${GITHUB_ENV}"

      - name: Build frontend
        working-directory: apps/frontend
        run: pnpm build

      - name: Deploy frontend to Cloudflare Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/frontend
          packageManager: pnpm
          command: deploy

  deploy-design:
    needs: changes
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && (needs.changes.outputs.shared == 'true' || needs.changes.outputs.design == 'true')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          HUSKY: 0

      - name: Export VITE variables
        env:
          VARS_JSON: ${{ toJSON(vars) }}
        run: |
          echo "${VARS_JSON}" | jq -r '
            to_entries
            | sort_by(.key)
            | .[]
            | select(.key | startswith("VITE_"))
            | select(.value != null)
            | select((.value | tostring | contains("\n")) | not)
            | "\(.key)=\(.value|tostring)"
          ' >> "${GITHUB_ENV}"

      - name: Build design studio
        working-directory: apps/design
        run: pnpm build

      - name: Deploy design studio to Cloudflare Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/design
          packageManager: pnpm
          command: deploy
