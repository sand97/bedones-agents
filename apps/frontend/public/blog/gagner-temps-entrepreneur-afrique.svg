<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <rect width="800" height="450" fill="#ffffff"/>
  <!-- Left: busy person timeline -->
  <text x="110" y="45" font-family="system-ui" font-size="14" font-weight="600" fill="#111">Avant</text>
  <line x1="150" y1="70" x2="150" y2="380" stroke="#111" stroke-width="2" stroke-linecap="round"/>
  <!-- Time slots -->
  <text x="80" y="90" font-family="system-ui" font-size="11" fill="#494949">6h</text>
  <rect x="165" y="75" width="130" height="30" rx="8" stroke="#111" stroke-width="1" fill="#f5f5f5"/>
  <text x="175" y="95" font-family="system-ui" font-size="10" fill="#111">📱 Messages nuit</text>
  <text x="80" y="135" font-family="system-ui" font-size="11" fill="#494949">8h</text>
  <rect x="165" y="120" width="130" height="30" rx="8" stroke="#111" stroke-width="1" fill="#f5f5f5"/>
  <text x="175" y="140" font-family="system-ui" font-size="10" fill="#111">💬 Commentaires</text>
  <text x="80" y="180" font-family="system-ui" font-size="11" fill="#494949">10h</text>
  <rect x="165" y="165" width="130" height="30" rx="8" stroke="#111" stroke-width="1" fill="#f5f5f5"/>
  <text x="175" y="185" font-family="system-ui" font-size="10" fill="#111">🔍 Chercher prix</text>
  <text x="80" y="225" font-family="system-ui" font-size="11" fill="#494949">12h</text>
  <rect x="165" y="210" width="130" height="30" rx="8" stroke="#111" stroke-width="1" fill="#f5f5f5"/>
  <text x="175" y="230" font-family="system-ui" font-size="10" fill="#111">📱 Encore messages</text>
  <text x="80" y="270" font-family="system-ui" font-size="11" fill="#494949">14h</text>
  <rect x="165" y="255" width="130" height="30" rx="8" stroke="#111" stroke-width="1" fill="#f5f5f5"/>
  <text x="175" y="275" font-family="system-ui" font-size="10" fill="#111">🔄 Mêmes questions</text>
  <text x="80" y="315" font-family="system-ui" font-size="11" fill="#494949">20h</text>
  <rect x="165" y="300" width="130" height="30" rx="8" stroke="#111" stroke-width="1" fill="#f5f5f5"/>
  <text x="175" y="320" font-family="system-ui" font-size="10" fill="#111">😩 Épuisé(e)</text>
  <!-- Dots on timeline -->
  <circle cx="150" cy="90" r="5" fill="#111"/>
  <circle cx="150" cy="135" r="5" fill="#111"/>
  <circle cx="150" cy="180" r="5" fill="#111"/>
  <circle cx="150" cy="225" r="5" fill="#111"/>
  <circle cx="150" cy="270" r="5" fill="#111"/>
  <circle cx="150" cy="315" r="5" fill="#111"/>
  <!-- Big total -->
  <rect x="165" y="350" width="130" height="35" rx="10" stroke="#111" stroke-width="2" fill="#e8e8e8"/>
  <text x="183" y="373" font-family="system-ui" font-size="13" font-weight="700" fill="#111">= 3h perdues</text>
  <!-- Arrow in middle -->
  <path d="M360 210 L440 210" stroke="#111" stroke-width="2.5" stroke-linecap="round" marker-end="url(#aw)"/>
  <!-- Right: freed up time -->
  <text x="550" y="45" font-family="system-ui" font-size="14" font-weight="600" fill="#111">Après Bedones</text>
  <line x1="580" y1="70" x2="580" y2="380" stroke="#111" stroke-width="2" stroke-linecap="round"/>
  <!-- Freed slots -->
  <circle cx="580" cy="100" r="5" fill="#111"/>
  <rect x="595" y="85" width="140" height="30" rx="8" stroke="#111" stroke-width="1" fill="#f5f5f5"/>
  <text x="605" y="105" font-family="system-ui" font-size="10" fill="#111">🤖 Agent répond auto</text>
  <circle cx="580" cy="170" r="5" fill="#111"/>
  <rect x="595" y="155" width="140" height="30" rx="8" stroke="#111" stroke-width="1" fill="none"/>
  <text x="605" y="175" font-family="system-ui" font-size="10" fill="#111">💡 Nouveau produit</text>
  <circle cx="580" cy="230" r="5" fill="#111"/>
  <rect x="595" y="215" width="140" height="30" rx="8" stroke="#111" stroke-width="1" fill="none"/>
  <text x="605" y="235" font-family="system-ui" font-size="10" fill="#111">🤝 Fournisseurs</text>
  <circle cx="580" cy="290" r="5" fill="#111"/>
  <rect x="595" y="275" width="140" height="30" rx="8" stroke="#111" stroke-width="1" fill="none"/>
  <text x="605" y="295" font-family="system-ui" font-size="10" fill="#111">📸 Créer contenu</text>
  <circle cx="580" cy="345" r="5" fill="#111"/>
  <rect x="595" y="330" width="140" height="30" rx="8" stroke="#111" stroke-width="1" fill="none"/>
  <text x="605" y="350" font-family="system-ui" font-size="10" fill="#111">👨‍👩‍👧 Famille / Repos</text>
  <rect x="595" y="365" width="140" height="30" rx="10" stroke="#111" stroke-width="2" fill="#f5f5f5"/>
  <text x="615" y="385" font-family="system-ui" font-size="12" font-weight="700" fill="#111">+3h libres ✨</text>
  <defs>
    <marker id="aw" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111"/>
    </marker>
  </defs>
</svg>
