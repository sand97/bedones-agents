<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <rect width="800" height="450" fill="#ffffff"/>
  <!-- Facebook post frame -->
  <rect x="230" y="40" width="340" height="370" rx="16" stroke="#111" stroke-width="2" fill="none"/>
  <!-- Post header -->
  <circle cx="265" cy="75" r="18" stroke="#111" stroke-width="1.5" fill="#f5f5f5"/>
  <text x="257" y="80" font-family="system-ui" font-size="14">🏪</text>
  <text x="292" y="72" font-family="system-ui" font-size="12" font-weight="600" fill="#111">Ma Boutique</text>
  <text x="292" y="88" font-family="system-ui" font-size="10" fill="#494949">Sponsorisé · 2h</text>
  <!-- Post image placeholder -->
  <rect x="245" y="105" width="310" height="100" rx="8" stroke="#111" stroke-width="1" fill="#f5f5f5"/>
  <text x="355" y="160" font-family="system-ui" font-size="28" text-anchor="middle">👟</text>
  <!-- Comments section -->
  <line x1="245" y1="220" x2="555" y2="220" stroke="#e5e5e5" stroke-width="1"/>
  <text x="260" y="245" font-family="system-ui" font-size="11" fill="#111">👤 Amina: Intéressée ! Prix ?</text>
  <!-- Good reply with checkmark -->
  <rect x="280" y="255" width="220" height="28" rx="10" stroke="#111" stroke-width="1.2" fill="#f5f5f5"/>
  <text x="295" y="274" font-family="system-ui" font-size="10" fill="#111">🤖 15 000 FCFA ! DM envoyé ✅</text>
  <!-- Comment from competitor - crossed out -->
  <text x="260" y="310" font-family="system-ui" font-size="11" fill="#494949">👤 Voleur: Moi c'est 8000 DM moi</text>
  <line x1="255" y1="306" x2="530" y2="306" stroke="#111" stroke-width="2" stroke-linecap="round"/>
  <!-- Shield icon -->
  <rect x="280" y="322" width="190" height="25" rx="10" stroke="#111" stroke-width="1.2" fill="#e8e8e8"/>
  <text x="298" y="339" font-family="system-ui" font-size="10" fill="#111">🛡️ Commentaire masqué auto</text>
  <!-- Timer icon on the right -->
  <text x="600" y="130" font-family="system-ui" font-size="14" fill="#111">⚡ 5 sec</text>
  <path d="M595 132 C585 140, 570 160, 565 175" stroke="#111" stroke-width="1.5" stroke-dasharray="4 3" stroke-linecap="round" fill="none"/>
  <!-- Results on right -->
  <text x="600" y="260" font-family="system-ui" font-size="12" font-weight="600" fill="#111">Résultat :</text>
  <text x="600" y="285" font-family="system-ui" font-size="11" fill="#494949">✅ Lead capturé</text>
  <text x="600" y="305" font-family="system-ui" font-size="11" fill="#494949">🛡️ Voleur bloqué</text>
  <text x="600" y="325" font-family="system-ui" font-size="11" fill="#494949">💬 DM envoyé</text>
</svg>
