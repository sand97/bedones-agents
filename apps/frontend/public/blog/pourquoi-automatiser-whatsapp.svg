<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <rect width="800" height="450" fill="#ffffff"/>
  <!-- Phone outline hand-drawn -->
  <path d="M320 80 C318 78, 316 76, 315 80 L310 370 C309 375, 312 378, 317 378 L483 380 C488 379, 491 376, 490 370 L492 82 C491 77, 488 75, 483 76 Z" stroke="#111" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Screen -->
  <rect x="325" y="110" width="150" height="240" rx="4" stroke="#111" stroke-width="1.5" fill="none"/>
  <!-- Chat bubbles -->
  <rect x="335" y="125" width="85" height="28" rx="12" stroke="#111" stroke-width="1.5" fill="#f5f5f5"/>
  <text x="350" y="144" font-family="system-ui" font-size="11" fill="#111">C'est combien ?</text>
  <rect x="380" y="165" width="82" height="28" rx="12" stroke="#111" stroke-width="1.5" fill="#e8e8e8"/>
  <text x="390" y="184" font-family="system-ui" font-size="11" fill="#111">15 000 FCFA</text>
  <rect x="335" y="205" width="70" height="28" rx="12" stroke="#111" stroke-width="1.5" fill="#f5f5f5"/>
  <text x="345" y="224" font-family="system-ui" font-size="11" fill="#111">Dispo ? 🤔</text>
  <rect x="395" y="245" width="60" height="28" rx="12" stroke="#111" stroke-width="1.5" fill="#e8e8e8"/>
  <text x="405" y="264" font-family="system-ui" font-size="11" fill="#111">Oui ! ✅</text>
  <!-- Clock with zzz (sleeping) -->
  <circle cx="580" cy="160" r="40" stroke="#111" stroke-width="2" fill="none" stroke-dasharray="4 3"/>
  <line x1="580" y1="160" x2="580" y2="132" stroke="#111" stroke-width="2" stroke-linecap="round"/>
  <line x1="580" y1="160" x2="598" y2="155" stroke="#111" stroke-width="2" stroke-linecap="round"/>
  <text x="570" y="105" font-family="system-ui" font-size="20" font-weight="bold" fill="#111">z</text>
  <text x="590" y="92" font-family="system-ui" font-size="16" font-weight="bold" fill="#111">z</text>
  <text x="605" y="82" font-family="system-ui" font-size="13" font-weight="bold" fill="#111">z</text>
  <!-- Arrow from clock to phone -->
  <path d="M538 168 C520 170, 505 175, 495 180" stroke="#111" stroke-width="1.5" stroke-dasharray="5 4" stroke-linecap="round" fill="none" marker-end="url(#arrow)"/>
  <!-- Checkmarks -->
  <path d="M560 260 l8 8 l16 -16" stroke="#111" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="545" y="295" font-family="system-ui" font-size="12" fill="#494949">24h/24</text>
  <path d="M560 315 l8 8 l16 -16" stroke="#111" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="545" y="350" font-family="system-ui" font-size="12" fill="#494949">Instantané</text>
  <!-- Bot icon -->
  <circle cx="220" cy="200" r="35" stroke="#111" stroke-width="2" fill="none"/>
  <circle cx="210" cy="192" r="4" fill="#111"/>
  <circle cx="230" cy="192" r="4" fill="#111"/>
  <path d="M208 210 C212 218, 228 218, 232 210" stroke="#111" stroke-width="2" stroke-linecap="round" fill="none"/>
  <line x1="220" y1="165" x2="220" y2="150" stroke="#111" stroke-width="2" stroke-linecap="round"/>
  <circle cx="220" cy="146" r="4" stroke="#111" stroke-width="1.5" fill="none"/>
  <!-- Arrow from bot to phone -->
  <path d="M258 200 C275 200, 295 195, 310 190" stroke="#111" stroke-width="1.5" stroke-linecap="round" fill="none" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111"/>
    </marker>
  </defs>
</svg>
