<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <rect width="800" height="450" fill="#ffffff"/>
  <!-- Conversation window -->
  <rect x="80" y="40" width="280" height="300" rx="14" stroke="#111" stroke-width="2" fill="none"/>
  <text x="160" y="68" font-family="system-ui" font-size="12" font-weight="600" fill="#111">💬 Conv. avec client</text>
  <line x1="90" y1="80" x2="350" y2="80" stroke="#e5e5e5" stroke-width="1"/>
  <!-- Agent response (highlighted as example) -->
  <rect x="150" y="95" width="190" height="35" rx="10" stroke="#111" stroke-width="1" fill="#e8e8e8"/>
  <text x="162" y="110" font-family="system-ui" font-size="9" fill="#111">🤖 Bonjour Madame. Votre</text>
  <text x="162" y="122" font-family="system-ui" font-size="9" fill="#111">commande sera traitée sous peu.</text>
  <!-- Client reply -->
  <rect x="100" y="140" width="140" height="28" rx="10" stroke="#111" stroke-width="1" fill="#f5f5f5"/>
  <text x="112" y="158" font-family="system-ui" font-size="9" fill="#111">👤 Ok merci... 😐</text>
  <!-- Red annotation -->
  <path d="M345 110 L380 110" stroke="#111" stroke-width="1.5" stroke-dasharray="3 2" stroke-linecap="round"/>
  <text x="385" y="115" font-family="system-ui" font-size="10" fill="#111">Trop formel ❌</text>
  <!-- Arrow pointing down -->
  <path d="M220 350 L220 380" stroke="#111" stroke-width="2" stroke-linecap="round" marker-end="url(#aw3)"/>
  <!-- Feedback chat with agent -->
  <rect x="420" y="40" width="310" height="180" rx="14" stroke="#111" stroke-width="2" fill="none"/>
  <text x="498" y="68" font-family="system-ui" font-size="12" font-weight="600" fill="#111">💡 Votre feedback</text>
  <line x1="430" y1="80" x2="720" y2="80" stroke="#e5e5e5" stroke-width="1"/>
  <!-- User feedback messages -->
  <rect x="435" y="92" width="270" height="40" rx="10" stroke="#111" stroke-width="1" fill="#f5f5f5"/>
  <text x="447" y="108" font-family="system-ui" font-size="9" fill="#111">👤 Cette réponse est trop formelle.</text>
  <text x="447" y="122" font-family="system-ui" font-size="9" fill="#111">Sois plus cool, utilise des emojis 😊</text>
  <!-- Agent confirmation -->
  <rect x="480" y="142" width="230" height="30" rx="10" stroke="#111" stroke-width="1" fill="#e8e8e8"/>
  <text x="492" y="162" font-family="system-ui" font-size="9" fill="#111">🤖 Compris ! J'adapte mon ton 👍</text>
  <!-- Arrow down to result -->
  <path d="M575 225 C575 260, 500 280, 500 300" stroke="#111" stroke-width="2" stroke-dasharray="5 3" stroke-linecap="round" fill="none" marker-end="url(#aw3)"/>
  <text x="590" y="270" font-family="system-ui" font-size="10" fill="#494949">Prochaine fois...</text>
  <!-- Improved response -->
  <rect x="300" y="330" width="300" height="85" rx="14" stroke="#111" stroke-width="2" fill="#f5f5f5"/>
  <text x="370" y="355" font-family="system-ui" font-size="12" font-weight="600" fill="#111">Nouvelle réponse ✨</text>
  <rect x="320" y="365" width="260" height="35" rx="10" stroke="#111" stroke-width="1" fill="#e8e8e8"/>
  <text x="332" y="380" font-family="system-ui" font-size="9" fill="#111">🤖 Hello Aïcha ! 😊 Ta commande est</text>
  <text x="332" y="393" font-family="system-ui" font-size="9" fill="#111">en route, tu la reçois très vite ! 🚀</text>
  <!-- Learning loop icon -->
  <path d="M200 290 C180 295, 170 310, 185 325 C200 340, 220 335, 225 320" stroke="#111" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <path d="M228 325 L225 315 L235 318" stroke="#111" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="165" y="310" font-family="system-ui" font-size="9" fill="#494949">Apprend</text>
  <defs>
    <marker id="aw3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111"/>
    </marker>
  </defs>
</svg>
