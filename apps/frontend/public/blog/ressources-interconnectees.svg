<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <rect width="800" height="450" fill="#ffffff"/>
  <!-- Facebook bubble top-left -->
  <rect x="60" y="40" width="200" height="90" rx="14" stroke="#111" stroke-width="2" fill="none"/>
  <text x="80" y="65" font-family="system-ui" font-size="11" font-weight="600" fill="#111">💬 Commentaire Facebook</text>
  <text x="80" y="85" font-family="system-ui" font-size="10" fill="#494949">"Il reste en 43 ?"</text>
  <text x="80" y="118" font-family="system-ui" font-size="9" fill="#494949">→ Post: Baskets Sport Pro</text>
  <!-- Instagram bubble top-right -->
  <rect x="540" y="40" width="200" height="90" rx="14" stroke="#111" stroke-width="2" fill="none"/>
  <text x="560" y="65" font-family="system-ui" font-size="11" font-weight="600" fill="#111">📩 DM Instagram</text>
  <text x="560" y="85" font-family="system-ui" font-size="10" fill="#494949">[envoie screenshot 📸]</text>
  <text x="560" y="105" font-family="system-ui" font-size="10" fill="#494949">"C'est combien ?"</text>
  <!-- Messenger bubble bottom-left -->
  <rect x="60" y="310" width="200" height="90" rx="14" stroke="#111" stroke-width="2" fill="none"/>
  <text x="80" y="335" font-family="system-ui" font-size="11" font-weight="600" fill="#111">💬 Messenger</text>
  <text x="80" y="355" font-family="system-ui" font-size="10" fill="#494949">"Vous avez la robe en M ?"</text>
  <text x="80" y="375" font-family="system-ui" font-size="9" fill="#494949">→ Réf. vue sur page FB</text>
  <!-- Arrows to center brain -->
  <path d="M265 90 C310 110, 340 140, 360 165" stroke="#111" stroke-width="1.5" stroke-dasharray="5 3" stroke-linecap="round" fill="none" marker-end="url(#aw4)"/>
  <path d="M535 90 C490 110, 460 140, 440 165" stroke="#111" stroke-width="1.5" stroke-dasharray="5 3" stroke-linecap="round" fill="none" marker-end="url(#aw4)"/>
  <path d="M265 350 C310 330, 340 300, 360 275" stroke="#111" stroke-width="1.5" stroke-dasharray="5 3" stroke-linecap="round" fill="none" marker-end="url(#aw4)"/>
  <!-- Center: Agent brain -->
  <circle cx="400" cy="220" r="55" stroke="#111" stroke-width="2.5" fill="#f5f5f5"/>
  <text x="375" y="210" font-family="system-ui" font-size="13" font-weight="600" fill="#111">Agent</text>
  <text x="370" y="230" font-family="system-ui" font-size="13" font-weight="600" fill="#111">Bedones</text>
  <text x="388" y="250" font-family="system-ui" font-size="16">🧠</text>
  <!-- Arrow to catalog -->
  <path d="M455 225 C490 228, 520 232, 555 235" stroke="#111" stroke-width="2" stroke-linecap="round" fill="none" marker-end="url(#aw4)"/>
  <!-- Catalog (WhatsApp source) -->
  <rect x="560" y="180" width="190" height="140" rx="14" stroke="#111" stroke-width="2" fill="none"/>
  <text x="580" y="205" font-family="system-ui" font-size="11" font-weight="600" fill="#111">📦 Catalogue WhatsApp</text>
  <line x1="570" y1="215" x2="740" y2="215" stroke="#e5e5e5" stroke-width="1"/>
  <rect x="575" y="222" width="160" height="28" rx="6" stroke="#111" stroke-width="1" fill="#f5f5f5"/>
  <text x="585" y="240" font-family="system-ui" font-size="9" fill="#111">👟 Baskets Pro · 15 000F · 41-45</text>
  <rect x="575" y="256" width="160" height="28" rx="6" stroke="#111" stroke-width="1" fill="none"/>
  <text x="585" y="274" font-family="system-ui" font-size="9" fill="#494949">👗 Robe Ankara · 8 000F · S-XL</text>
  <rect x="575" y="290" width="160" height="20" rx="6" stroke="#111" stroke-width="1" fill="none"/>
  <text x="585" y="304" font-family="system-ui" font-size="9" fill="#494949">👜 Sac cuir · 22 000F</text>
  <!-- Arrow back from catalog to brain -->
  <path d="M555 260 C530 255, 500 248, 458 240" stroke="#111" stroke-width="1.5" stroke-dasharray="4 3" stroke-linecap="round" fill="none" marker-end="url(#aw4)"/>
  <text x="470" y="268" font-family="system-ui" font-size="9" fill="#494949">retailer_id</text>
  <!-- Response arrows going back -->
  <path d="M365 275 C340 310, 310 340, 270 355" stroke="#111" stroke-width="1.5" stroke-linecap="round" fill="none" marker-end="url(#aw4)"/>
  <path d="M370 170 C350 130, 310 100, 270 88" stroke="#111" stroke-width="1.5" stroke-linecap="round" fill="none" marker-end="url(#aw4)"/>
  <!-- Bottom message -->
  <rect x="260" y="400" width="280" height="35" rx="10" stroke="#111" stroke-width="1.5" fill="#f5f5f5"/>
  <text x="290" y="422" font-family="system-ui" font-size="11" font-weight="500" fill="#111">1 catalogue → Toutes les plateformes</text>
  <defs>
    <marker id="aw4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111"/>
    </marker>
  </defs>
</svg>
