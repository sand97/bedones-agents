<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <rect width="800" height="450" fill="#ffffff"/>
  <!-- Two people at desk - hand drawn style -->
  <!-- Person 1 (support) -->
  <circle cx="280" cy="150" r="28" stroke="#111" stroke-width="2" fill="none"/>
  <circle cx="272" cy="144" r="3" fill="#111"/>
  <circle cx="288" cy="144" r="3" fill="#111"/>
  <path d="M270 158 C275 165, 285 165, 290 158" stroke="#111" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <!-- Body -->
  <path d="M280 178 C280 200, 280 220, 280 250" stroke="#111" stroke-width="2" stroke-linecap="round"/>
  <path d="M280 195 C260 210, 245 220, 235 225" stroke="#111" stroke-width="2" stroke-linecap="round"/>
  <path d="M280 195 C295 200, 305 210, 310 215" stroke="#111" stroke-width="2" stroke-linecap="round"/>
  <!-- Speech bubble from support -->
  <rect x="320" y="100" width="160" height="55" rx="12" stroke="#111" stroke-width="1.5" fill="#f5f5f5"/>
  <path d="M330 155 L320 168 L345 155" stroke="#111" stroke-width="1.5" fill="#f5f5f5"/>
  <text x="338" y="122" font-family="system-ui" font-size="11" fill="#111">On configure</text>
  <text x="338" y="140" font-family="system-ui" font-size="11" fill="#111">ça ensemble ! 😊</text>
  <!-- Person 2 (user) -->
  <circle cx="520" cy="150" r="28" stroke="#111" stroke-width="2" fill="none"/>
  <circle cx="512" cy="144" r="3" fill="#111"/>
  <circle cx="528" cy="144" r="3" fill="#111"/>
  <path d="M510 160 C515 165, 525 165, 530 160" stroke="#111" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <!-- Body -->
  <path d="M520 178 C520 200, 520 220, 520 250" stroke="#111" stroke-width="2" stroke-linecap="round"/>
  <path d="M520 195 C500 210, 490 215, 485 220" stroke="#111" stroke-width="2" stroke-linecap="round"/>
  <path d="M520 195 C540 210, 555 220, 565 225" stroke="#111" stroke-width="2" stroke-linecap="round"/>
  <!-- Laptop between them -->
  <rect x="340" y="225" width="120" height="75" rx="6" stroke="#111" stroke-width="2" fill="none"/>
  <rect x="350" y="235" width="100" height="50" rx="3" stroke="#111" stroke-width="1" fill="#f5f5f5"/>
  <rect x="315" y="300" width="170" height="10" rx="3" stroke="#111" stroke-width="1.5" fill="none"/>
  <!-- Screen content mini -->
  <text x="370" y="258" font-family="system-ui" font-size="10" fill="#111">Bedones</text>
  <rect x="360" y="265" width="80" height="8" rx="2" fill="#e8e8e8"/>
  <!-- Steps at bottom -->
  <circle cx="200" cy="380" r="20" stroke="#111" stroke-width="2" fill="#f5f5f5"/>
  <text x="195" y="386" font-family="system-ui" font-size="14" font-weight="600" fill="#111">1</text>
  <text x="170" y="420" font-family="system-ui" font-size="11" fill="#494949">Créer son</text>
  <text x="175" y="435" font-family="system-ui" font-size="11" fill="#494949">compte</text>
  <path d="M225 380 L295 380" stroke="#111" stroke-width="1.5" stroke-dasharray="4 3" stroke-linecap="round"/>
  <circle cx="320" cy="380" r="20" stroke="#111" stroke-width="2" fill="#f5f5f5"/>
  <text x="315" y="386" font-family="system-ui" font-size="14" font-weight="600" fill="#111">2</text>
  <text x="288" y="420" font-family="system-ui" font-size="11" fill="#494949">Session de</text>
  <text x="297" y="435" font-family="system-ui" font-size="11" fill="#494949">30 min</text>
  <path d="M345 380 L415 380" stroke="#111" stroke-width="1.5" stroke-dasharray="4 3" stroke-linecap="round"/>
  <circle cx="440" cy="380" r="20" stroke="#111" stroke-width="2" fill="#f5f5f5"/>
  <text x="435" y="386" font-family="system-ui" font-size="14" font-weight="600" fill="#111">3</text>
  <text x="418" y="420" font-family="system-ui" font-size="11" fill="#494949">Agent</text>
  <text x="408" y="435" font-family="system-ui" font-size="11" fill="#494949">opérationnel</text>
  <path d="M465 380 L535 380" stroke="#111" stroke-width="1.5" stroke-dasharray="4 3" stroke-linecap="round"/>
  <circle cx="560" cy="380" r="20" stroke="#111" stroke-width="2" fill="#f5f5f5"/>
  <text x="556" y="386" font-family="system-ui" font-size="18">🚀</text>
  <text x="537" y="420" font-family="system-ui" font-size="11" fill="#494949">Autonome !</text>
</svg>
